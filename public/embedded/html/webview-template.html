<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light only">
    <meta name="supported-color-schemes" content="light">

    <style>{{RESET-CSS}}</style>
    <style>{{ARTICLE-CSS}}</style>
    <style>{{MARK-CSS}}</style>
    <style>{{BOTTOM-LINE-CSS}}</style>

    <style>
        /* 页面特定样式 */
        body {
            padding-top: 0px !important;
            padding-left: 20px !important;
            padding-right: 20px !important;
            padding-bottom: 150px !important;
            /* 禁用系统长按弹出菜单，保留文本可选 */
            -webkit-touch-callout: none;
        }
    </style>
</head>
<body lang="en">
    <div>
        <!-- 动态内容占位符 -->
        {{CONTENT}}
    </div>

    <div class="bottom-seperator-line">
        <div class="seperator-line"></div>
    </div>

    <script>
        {{WEBVIEW-BRIGDE-JS}}
    </script>
    <script>
        (function() {
            var debounceTimer = null;
            var lastSelectedText = '';

            document.addEventListener('selectionchange', function() {
                if (debounceTimer) {
                    clearTimeout(debounceTimer);
                }
                debounceTimer = setTimeout(function() {
                    var selection = window.getSelection();
                    var text = selection ? selection.toString().trim() : '';

                    if (text.length > 0 && text !== lastSelectedText) {
                        lastSelectedText = text;

                        // 获取选中区域顶部的视口 Y 坐标（iOS 使用此值定位菜单）
                        var selectionY = 0;
                        try {
                            if (selection.rangeCount > 0) {
                                var rect = selection.getRangeAt(0).getBoundingClientRect();
                                selectionY = rect.top;
                            }
                        } catch (e) {}

                        window.SlaxWebViewBridge.postMessage({
                            type: 'textSelected',
                            text: text,
                            selectionY: selectionY
                        });
                    } else if (text.length === 0 && lastSelectedText.length > 0) {
                        lastSelectedText = '';
                        window.SlaxWebViewBridge.postMessage({
                            type: 'textDeselected'
                        });
                    }
                }, 200);
            });

            // 阻止系统右键/长按上下文菜单弹出
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });
        })();
    </script>
</body>
</html>
