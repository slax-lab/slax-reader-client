<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light only">
    <meta name="supported-color-schemes" content="light">

    <style>{{RESET-CSS}}</style>
    <style>{{ARTICLE-CSS}}</style>
    <style>{{MARK-CSS}}</style>
    <style>{{BOTTOM-LINE-CSS}}</style>

    <style>
        body {
            padding-top: 0px !important;
            padding-left: 20px !important;
            padding-right: 20px !important;
            padding-bottom: 150px !important;
            -webkit-touch-callout: none;
        }
    </style>
</head>
<body lang="en">
    <div>
        {{CONTENT}}
    </div>

    <div class="bottom-seperator-line">
        <div class="seperator-line"></div>
    </div>

    <script>
        {{WEBVIEW-BRIGDE-JS}}
    </script>
    <script>
        (function() {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.NativeBridge) {
                document.body.style.webkitHyphens = 'auto';
                document.body.style.hyphens = 'auto';
            }
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });
        })();
    </script>
    <script>
        // YouTube 播放器：YT IFrame API 接管，提供 seekTo（原地跳转、保持播放）+ 当前时间查询。
        (function() {
            var player = null;
            var pendingSeek = null;

            // 通知原生把外层滚动容器滚到顶部（WebView 全高、由原生滚动，window.scrollTo 在安卓无效）
            function postScrollTop() {
                try {
                    var payload = JSON.stringify({ type: 'scrollToTop' });
                    if (window.NativeBridge && window.NativeBridge.postMessage) {
                        window.NativeBridge.postMessage(payload);
                    } else if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.NativeBridge) {
                        window.webkit.messageHandlers.NativeBridge.postMessage(payload);
                    }
                } catch (e) {}
            }

            function doSeek(seconds) {
                if (player && typeof player.seekTo === 'function') {
                    player.seekTo(seconds, true);
                    if (typeof player.playVideo === 'function') player.playVideo();
                } else {
                    pendingSeek = seconds;
                }
                // 跳转后回到顶部，露出视频（原生滚动外层容器）
                postScrollTop();
            }
            window.__slaxSeekYoutube = doSeek;

            // 供原生查询当前播放秒数（用于字幕面板定位当前行）；无播放器返回 -1
            window.__slaxGetYoutubeTime = function() {
                if (player && typeof player.getCurrentTime === 'function') {
                    return Math.floor(player.getCurrentTime() || 0);
                }
                return -1;
            };

            function initPlayer() {
                var wrap = document.querySelector('.slax-yt');
                if (!wrap) return;
                var iframe = wrap.querySelector('iframe');
                if (!iframe) return;
                var m = (iframe.getAttribute('src') || '').match(/\/embed\/([A-Za-z0-9_-]{11})/);
                if (!m) return;
                var videoId = m[1];

                // player 容器保持 16:9，YT 用 inner 创建 iframe（inner 被替换为 iframe）
                var box = document.createElement('div');
                box.className = 'slax-yt-player';
                var inner = document.createElement('div');
                box.appendChild(inner);
                iframe.parentNode.insertBefore(box, iframe);

                function create() {
                    player = new YT.Player(inner, {
                        videoId: videoId,
                        playerVars: { rel: 0, playsinline: 1 },
                        events: {
                            onReady: function() {
                                if (iframe && iframe.parentNode) iframe.parentNode.removeChild(iframe);
                                if (pendingSeek != null) { doSeek(pendingSeek); pendingSeek = null; }
                            }
                        }
                    });
                }

                if (window.YT && window.YT.Player) {
                    create();
                } else {
                    var prev = window.onYouTubeIframeAPIReady;
                    window.onYouTubeIframeAPIReady = function() {
                        if (typeof prev === 'function') prev();
                        create();
                    };
                    if (!document.querySelector('script[data-slax-yt]')) {
                        var tag = document.createElement('script');
                        tag.src = 'https://www.youtube.com/iframe_api';
                        tag.setAttribute('data-slax-yt', '1');
                        document.head.appendChild(tag);
                    }
                }
            }

            // 正文平铺字幕：点击时间戳 → seek（doSeek 内含回顶）
            document.addEventListener('click', function(e) {
                var t = e.target;
                var chip = t && t.closest ? t.closest('[data-yt-seek]') : null;
                if (!chip) return;
                var seconds = parseInt(chip.getAttribute('data-yt-seek'), 10);
                if (isNaN(seconds)) return;
                e.preventDefault();
                doSeek(seconds);
            });

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initPlayer);
            } else {
                initPlayer();
            }
        })();
    </script>
</body>
</html>
